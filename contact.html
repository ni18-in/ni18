<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description"
        content="Contact ni18 for innovative technology solutions. We are here to help you with your digital needs.">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://ni18-in.github.io/ni18/contact.html">
    <meta property="og:title" content="Contact Us - NI18">
    <meta property="og:description"
        content="Contact ni18 for innovative technology solutions. We are here to help you with your digital needs.">
    <meta property="og:image" content="https://ni18-in.github.io/ni18/images/ni18.png">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://ni18-in.github.io/ni18/contact.html">
    <meta property="twitter:title" content="Contact Us - NI18">
    <meta property="twitter:description"
        content="Contact ni18 for innovative technology solutions. We are here to help you with your digital needs.">
    <meta property="twitter:image" content="https://ni18-in.github.io/ni18/images/ni18.png">

    <link rel="canonical" href="https://ni18-in.github.io/ni18/contact.html">

    <title>Contact Us - NI18</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link href="style.css" rel="stylesheet">
</head>

<body>

    <div id="navbar-placeholder"></div>

    <!-- Hero Section -->
    <section id="contact-hero" class="hero-section gradient-overlay text-center" style="min-height: 40vh;">
        <div class="container hero-content">
            <h1 class="display-4 fw-bold mb-4">Get in Touch</h1>
            <p class="lead">We'd love to hear from you. Let's create something amazing together.</p>
        </div>
    </section>

    <!-- Contact Form Section -->
    <section class="py-5">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-8">
                    <div class="card shadow border-0">
                        <div class="card-body p-5">
                            <h2 class="text-center mb-4">Send us a Message</h2>
                            <form action="https://formspree.io/f/xbjnqqlg" method="POST">
                                <div class="mb-3">
                                    <label for="name" class="form-label">Name</label>
                                    <input type="text" class="form-control" id="name" name="name" required>
                                </div>
                                <div class="mb-3">
                                    <label for="email" class="form-label">Email address</label>
                                    <input type="email" class="form-control" id="email" name="email" required>
                                </div>
                                <div class="mb-3">
                                    <label for="subject" class="form-label">Subject</label>
                                    <input type="text" class="form-control" id="subject" name="subject" required>
                                </div>
                                <div class="mb-3">
                                    <label for="message" class="form-label">Message</label>
                                    <textarea class="form-control" id="message" name="message" rows="5"
                                        required></textarea>
                                </div>
                                <div class="d-grid">
                                    <button type="submit" class="btn btn-primary btn-lg">Send Message</button>
                                </div>
                            </form>
                            <p class="text-center mt-3 text-muted small">
                                Powered by <a href="https://formspree.io" target="_blank">Formspree</a>
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
